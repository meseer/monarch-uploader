name: Release

on:
  push:
    tags:
      - 'v*'  # Triggers on version tags like v1.0.0, v2.1.3, etc.

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Use Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '24.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run tests
      run: npm test

    - name: Build userscript
      run: BUILD_TYPE=stable npm run build

    - name: Get version from tag
      id: version
      run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

    - name: Prepare release assets
      run: |
        mkdir -p release-assets
        cp dist/*.user.js release-assets/ 2>/dev/null || true
        ls -la release-assets/

    - name: Generate changelog
      id: changelog
      run: |
        # Get commits since last tag
        PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
        if [ -n "$PREVIOUS_TAG" ]; then
          CHANGELOG=$(git log --pretty=format:"- %s" $PREVIOUS_TAG..HEAD)
          CONDENSED_CHANGELOG=$(git log --pretty=format:"%s" $PREVIOUS_TAG..HEAD | head -n 10 | paste -sd " | " -)
        else
          CHANGELOG=$(git log --pretty=format:"- %s" HEAD)
          CONDENSED_CHANGELOG=$(git log -1 --pretty=format:"%s")
        fi
        
        # Write changelog to file
        cat > CHANGELOG.md << EOF
        ## What's Changed
        
        $CHANGELOG
        
        ## Installation
        
        1. Download the userscript file below
        2. Open Tampermonkey dashboard
        3. Create a new script or import from file
        4. Copy-paste the userscript content
        5. Save and enable the script
        
        ## Supported Financial Institutions
        
        - Questrade
        - Canada Life
        
        **Full Changelog**: https://github.com/${{ github.repository }}/compare/$PREVIOUS_TAG...${{ steps.version.outputs.VERSION }}
        EOF
        
        echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
        cat CHANGELOG.md >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
        
        echo "CONDENSED_CHANGELOG<<EOF" >> $GITHUB_OUTPUT
        echo "$CONDENSED_CHANGELOG" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    - name: Create Release
      uses: actions/create-release@v1
      id: create_release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.version.outputs.VERSION }}
        release_name: Monarch Money Balance Uploader ${{ steps.version.outputs.VERSION }}
        body: ${{ steps.changelog.outputs.CHANGELOG }}
        draft: false
        prerelease: ${{ contains(steps.version.outputs.VERSION, 'beta') || contains(steps.version.outputs.VERSION, 'alpha') }}

    - name: Upload Userscript Asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./dist/monarch-uploader.user.js
        asset_name: monarch-uploader-stable.user.js
        asset_content_type: application/javascript

    - name: Upload Build Assets (if exist)
      run: |
        for file in release-assets/*.user.js; do
          if [ -f "$file" ] && [ "$(basename "$file")" != "monarch-uploader.user.js" ]; then
            filename=$(basename "$file")
            echo "Uploading additional asset: $filename"
            
            # Use GitHub CLI to upload additional assets
            gh release upload ${{ steps.version.outputs.VERSION }} "$file" --clobber
          fi
        done
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Update release with download stats
      run: |
        echo "Release created successfully!"
        echo "Stable Download URL: https://github.com/${{ github.repository }}/releases/latest/download/monarch-uploader-stable.user.js"
        echo "Version-specific URL: https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.VERSION }}/monarch-uploader-stable.user.js"

    - name: Update GitHub Gist
      if: env.GIST_TOKEN != ''
      env:
        GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
        GIST_ID: f00fb552c96efeb3eb4e4e1fd520d4e7
      run: |
        echo "Updating GitHub Gist with latest userscript..."
        
        # Read the built userscript content
        USERSCRIPT_CONTENT=$(cat dist/monarch-uploader.user.js)
        
        # Escape the content for JSON
        ESCAPED_CONTENT=$(echo "$USERSCRIPT_CONTENT" | jq -Rs .)
        
        # Get version without 'v' prefix
        VERSION="${{ steps.version.outputs.VERSION }}"
        VERSION="${VERSION#v}"
        
        # Get condensed changelog
        CONDENSED_CHANGELOG="${{ steps.changelog.outputs.CONDENSED_CHANGELOG }}"
        
        # Create the JSON payload
        cat > gist_update.json << EOF
        {
          "description": "Monarch Money Balance Uploader v${VERSION} - Tampermonkey userscript | Changes: ${CONDENSED_CHANGELOG}",
          "files": {
            "monarch-uploader.user.js": {
              "content": $ESCAPED_CONTENT
            }
          }
        }
        EOF
        
        # Update the gist using GitHub API
        response=$(curl -s -w "\n%{http_code}" -X PATCH \
          -H "Authorization: token $GIST_TOKEN" \
          -H "Accept: application/vnd.github.v3+json" \
          -d @gist_update.json \
          "https://api.github.com/gists/$GIST_ID")
        
        # Get the HTTP status code
        http_code=$(echo "$response" | tail -n1)
        
        # Check if update was successful
        if [ "$http_code" = "200" ]; then
          echo "✅ Successfully updated gist: https://gist.github.com/meseer/$GIST_ID"
          echo "Direct install link: https://gist.github.com/meseer/$GIST_ID/raw/monarch-uploader.user.js"
        else
          echo "⚠️ Failed to update gist (HTTP $http_code)"
          echo "Response: $(echo "$response" | head -n-1)"
          echo "Note: This won't fail the release, but the gist wasn't updated."
        fi
        
        # Clean up
        rm -f gist_update.json

    - name: Gist Update Instructions
      if: env.GIST_TOKEN == ''
      env:
        GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
      run: |
        echo "ℹ️ GitHub Gist auto-update is not configured."
        echo "To enable automatic gist updates:"
        echo "1. Go to https://github.com/settings/tokens/new"
        echo "2. Generate a token with 'gist' scope"
        echo "3. Add it as a repository secret named 'GIST_TOKEN'"
        echo "   Repository Settings → Secrets and variables → Actions → New repository secret"
